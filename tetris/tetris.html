<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="../commonStyles/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1 class="title">Tetris</h1>
        <nav>
            <a class="back" href="../index.html">
                🏃🚶🧎
            </a>
        </nav>
    </div>

<!-- TODO - в мобилке, перенести табло next фигуры через абсолют между кнопками и убрать белый фон, просто будет в ток появляться фигура между кнопок и перенести в мобилке счетчик очков, ну или открыть через block/none аналог -->

<main class="main">
    <div class="container">
        <!--code-->
        <div id="game-container" class="game-shell">
            <div id="board-container">
                <!--canvas-->
                <canvas id="tetris-board" width="300" height="600"></canvas>
                <!--canvas-->
            </div>
            <div id="controls">
                <div class="d-pad">
                    <div class="left-right">
                        <div id="left" class="d-pad-button">&#9664;</div>
                        <div id="right" class="d-pad-button">&#9654;</div>
                    </div>
                    <div class="down-rotate">
                        <div id="down" class="d-pad-button">&#9660;</div>
                        <div id="rotate" class="d-pad-button">R</div>
                    </div>
                </div>

                <div id="score">Score: <span id="score-value">0</span></div>
                <div id="next-piece-container">
                    <h3></h3>
                    <!--canvas-->
                    <canvas id="next-piece" width="120" height="120"></canvas>
                    <!--canvas-->
                </div>
                <div class="buttons-wrapper">
                    <button id="start-button" class="btn btn_accent">Start Game</button>
                    <button id="restart-button" class="btn btn_secondary" style="display: none">Restart Game</button>
                </div>

                <div id="instructions">
                    Use arrow keys to move.<br>
                    Press "A","S","D" and "W" to rotate.
                </div>
                <div id="music-control">
                    <label>
                        <input type="checkbox" id="music-toggle"> Background Music
                    </label>
                </div>
            </div>
        </div>
        <!--code-->
    </div>
</main>
